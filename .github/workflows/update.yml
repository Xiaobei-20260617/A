name: Update FProxies

on:
  schedule:
    - cron: "0 1,13 * * *"   # UTC 01:00 & 13:00 → 北京 09:00 & 21:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and generate config
        run: python fetch_nodes.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "update: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
